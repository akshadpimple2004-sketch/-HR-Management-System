server {
    listen 80;
    server_name _; # Replace with actual domain name in production

    # Redirect all HTTP requests to HTTPS (uncomment in production once SSL is setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploads locally if S3 is not active
    location /uploads/ {
        alias /var/www/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}


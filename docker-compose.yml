version: '3.8'

services:
  # MySQL Database Container
  db:
    image: mysql:8.0
    container_name: hr-system-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hr_management
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hr-network

  # Backend App Container
  backend:
    image: node:20-alpine
    container_name: hr-system-backend
    restart: always
    working_dir: /usr/src/app
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=hr_management
      - DB_PORT=3306
      - JWT_SECRET=hr-system-secret-key-2026
    depends_on:
      - db
    command: npm run dev
    networks:
      - hr-network

  # Frontend App Container
  frontend:
    image: node:20-alpine
    container_name: hr-system-frontend
    restart: always
    working_dir: /usr/src/app
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    command: npm run dev
    networks:
      - hr-network

volumes:
  mysql_data:

networks:
  hr-network:
    driver: bridge
